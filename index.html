<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vulnerability Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #c1630c; color: white; font-family: 'Arial', sans-serif; }
        .container { margin-top: 50px; }
        .card { background: #f60404; border-radius: 10px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.2); }
        .progress { height: 8px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="welcomePage" class="text-center">
        <h1>🔍 Welcome to the Scanner</h1>
        <button class="btn btn-primary mt-3" onclick="showPage('startPage')">Start Scan</button>
    </div>

    <div id="startPage" class="hidden">
        <div class="card p-4">
            <h2 class="text-center">Enter Website URL</h2>
            <input type="text" id="url" class="form-control mt-3" placeholder="http://example.com">
            <button class="btn btn-success mt-3 w-100" onclick="startScan()">Scan Now</button>
        </div>
    </div>

    <div id="progressPage" class="hidden text-center">
        <h2>Scanning in Progress...</h2>
        <div class="progress mt-3">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
        </div>
    </div>

    <div id="resultPage" class="hidden">
        <div class="alert mt-3"></div>
        <button class="btn btn-secondary mt-3" onclick="showPage('startPage')">Scan Another</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function showPage(pageId) {
        $(".container > div").hide();
        $("#" + pageId).show();
    }

    function startScan() {
        let url = $("#url").val().trim();
        if (!url) { alert("⚠️ Please enter a valid URL!"); return; }
        showPage('progressPage');
        
        $.ajax({
            url: "/scan", type: "POST", contentType: "application/json",
            data: JSON.stringify({ "url": url }),
            success: function(response) {
                showPage('resultPage');
                $("#resultPage .alert").removeClass("alert-danger").addClass("alert-success").html(response.result).show();
            },
            error: function() {
                showPage('resultPage');
                $("#resultPage .alert").removeClass("alert-success").addClass("alert-danger").html("❌ Error scanning website.").show();
            }
        });
    }
</script>

</body>
</html>
